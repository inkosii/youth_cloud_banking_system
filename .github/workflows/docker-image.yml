name: Docker Compose CI

on:
  push:
    branches: ["main"]

jobs:
  docker:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build containers
      run: docker compose build

    - name: Start containers
      run: docker compose up -d

    - name: List running containers
      run: docker ps
