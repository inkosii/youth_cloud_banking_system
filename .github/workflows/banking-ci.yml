name: Cloud Banking CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
  PROJECT_NAME: cloud-banking

jobs:

  build-java:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build Eureka Server
        run: |
          cd java-services/eureka-server
          mvn clean package -DskipTests

      - name: Build Account Service
        run: |
          cd java-services/account-service
          mvn clean package -DskipTests

      - name: Build Transaction Service
        run: |
          cd java-services/transaction-service
          mvn clean package -DskipTests

      - name: Collect JARs for Docker Build
        run: |
          mkdir -p target
          cp java-services/eureka-server/target/eureka-server-0.0.1-SNAPSHOT.jar target/
          cp java-services/account-service/target/account-service-0.0.1-SNAPSHOT.jar target/
          cp java-services/transaction-service/target/transaction-service-0.0.1-SNAPSHOT.jar target/

  docker-build:
    needs: build-java
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_PASSWORD }}

      - name: Build Docker Images
        run: |
          # Build Eureka Server
          docker build -t $DOCKERHUB_USERNAME/eureka-server:latest -f java-services/eureka-server/Dockerfile java-services/eureka-server
          # Build Account Service
          docker build -t $DOCKERHUB_USERNAME/account-service:latest -f java-services/account-service/Dockerfile java-services/account-service
          # Build Transaction Service
          docker build -t $DOCKERHUB_USERNAME/transaction-service:latest -f java-services/transaction-service/Dockerfile java-services/transaction-service

      - name: Push Docker Images
        run: |
          docker push $DOCKERHUB_USERNAME/eureka-server:latest
          docker push $DOCKERHUB_USERNAME/account-service:latest
          docker push $DOCKERHUB_USERNAME/transaction-service:latest

  integration-test:
    needs: docker-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Start System
        run: docker compose up -d

      - name: Wait for containers
        run: sleep 30

      - name: Show Running Containers
        run: docker ps
