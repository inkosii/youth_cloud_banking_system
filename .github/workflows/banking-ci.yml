name: Cloud Banking CI Pipeline

on:
  push:
    branches: ["main"]

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

jobs:

  build-java:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build Eureka Server
        run: |
          cd java-services/eureka-server
          mvn clean package -DskipTests

      - name: Build Account Service
        run: |
          cd java-services/account-service
          mvn clean package -DskipTests

      - name: Build Transaction Service
        run: |
          cd java-services/transaction-service
          mvn clean package -DskipTests

  docker-build:
    needs: build-java
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Images
        run: |
          docker build -t $DOCKER_USERNAME/account-service:latest java-services/account-service
          docker build -t $DOCKER_USERNAME/transaction-service:latest java-services/transaction-service
          docker build -t $DOCKER_USERNAME/eureka-server:latest java-services/eureka-server

      - name: Push Docker Images
        run: |
          docker push $DOCKER_USERNAME/account-service:latest
          docker push $DOCKER_USERNAME/transaction-service:latest
          docker push $DOCKER_USERNAME/eureka-server:latest

  integration-test:
    needs: docker-build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Start Services
        run: docker compose up -d

      - name: Wait for containers
        run: sleep 30

      - name: Show running containers
        run: docker ps
